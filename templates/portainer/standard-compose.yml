networks:
  caddy-net:
    name: caddy-net
    external: true

services:
  service_name:
    cap_add:
      - ALL
    cap_drop:
      - ALL
    container_name: <service_name>
    deploy:
      resources:
        limits:
          memory: 256M
    dns: <check pihole container IP on host's caddy-net>
    environment:
      - UID=${UID}
      - GID=${GID}
    expose:
      - <port>
    healthcheck:
      test: ["CMD-SHELL", "<healthcheck command> || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    hostname: <service_name>
    image: <image-name>:<tag>
    labels:
      - 'wud.display.icon=sh:<project-name>'
      - 'wud.tag.include=^v\d+\.\d+\.\d+.*$$'
      - 'wud.link.template=https://github.com/<organization>/<project>/releases/tag/$${raw}'
    logging: (customize as needed, see /etc/docker/daemon.json for default)
    networks:
      caddy-net:
        ipv4_address: <see host caddy-net CIDR>
    ports:
      - '<host-port>:<container-port>'
    read_only: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /run
    user: "${UID}:${GID}"
    volumes:
      - data:/config

volumes:
  data:
