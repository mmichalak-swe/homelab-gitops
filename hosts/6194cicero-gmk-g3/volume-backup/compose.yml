networks:
  caddy-net:
    name: caddy-net
    external: true
  proxy-net:
    driver: bridge
    internal: true
    ipam:
      config:
        - gateway: 172.19.1.1
          ip_range: 172.19.1.0/24
          subnet: 172.19.1.0/24
    name: volume-backup_sp_net

services:
  volume-backup:
    cap_drop:
      - ALL
    container_name: volume-backup
    depends_on:
      volume-backup-socket-proxy:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
    dns: 172.19.0.2
    environment:
      - BACKUP_CRON_EXPRESSION=0 0 5 31 2 ?
      - BACKUP_EXCLUDE_REGEXP=/backup/.*/(\.(bash_history|ash_history|zsh_history)|\.DS_Store|Thumbs\.db|desktop\.ini)$$
      - BACKUP_FILENAME=speedtest_data-%Y-%m-%dT%H-%M-%S.tar.gz
      - BACKUP_PRUNING_PREFIX=speedtest_data-
      - BACKUP_RETENTION_DAYS=7
      - BACKUP_STOP_DURING_BACKUP_LABEL=test-backup
      - DOCKER_HOST=tcp://volume-backup-socket-proxy:2375
      # - TZ=${TZ}
    # healthcheck:
    #   test: ["CMD-SHELL", "<healthcheck command> || exit 1"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3
    #   start_period: 10s
    hostname: volume-backup
    image: offen/docker-volume-backup:v2.47.2-tzdata-test
    labels:
      - 'wud.display.icon=sh:docker-volume-backup'
      - 'wud.tag.include=^v\d+\.\d+\.\d+$$'
      - 'wud.link.template=https://github.com/offen/docker-volume-backup/releases/tag/$${raw}'
    networks:
      caddy-net:
        ipv4_address: 172.19.0.10
      proxy-net:
    read_only: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /var/lock
    user: "911:911"
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - /usr/share/zoneinfo:/usr/share/zoneinfo:ro
      - speedtest_data:/backup/speedtest:ro
      - /tmp/docker-volume-backup-speedtest:/archive

  volume-backup-socket-proxy:
    cap_drop:
      - ALL
    container_name: volume-backup-socket-proxy
    environment:
      - ALLOW_START=1
      - ALLOW_STOP=1
      - ALLOW_RESTARTS=0
      - ALLOW_PAUSE=0
      - ALLOW_UNPAUSE=0
      - CONTAINERS=1
      - INFO=1
      - PING=1
      - SOCKET_PATH=/var/run/docker.sock
      - TZ=${TZ}
      - VERSION=1
    expose:
      - 2375
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --no-verbose http://localhost:2375/_ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    hostname: volume-backup-socket-proxy
    image: linuxserver/socket-proxy:3.2.14-r0-ls74
    labels:
      - 'wud.tag.include=^\d+\.\d+\.\d+\-r\d\-ls\d+$$'
      - 'wud.link.template=https://github.com/linuxserver/docker-socket-proxy/releases/tag/$${raw}'
    networks:
      proxy-net:
    read_only: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /run:exec
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

volumes:
  speedtest_data:
    external: true
