networks:
  caddy-net:
    name: caddy-net
    external: true

services:
  pairdrop:
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - FOWNER
    cap_drop:
      - ALL
    container_name: pairdrop
    dns: 172.19.0.2
    deploy:
      resources:
        limits:
          memory: 256M
    environment:
      - DEBUG_MODE=${DEBUG_MODE}
      - RATE_LIMIT=${RATE_LIMIT}
      - TZ=${TZ}
      - WS_FALLBACK=${WS_FALLBACK}
    expose:
      - 3000
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --no-verbose http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    hostname: pairdrop
    image: linuxserver/pairdrop:1.11.2@sha256:4c989b99fc3587641739bb05201273bab8c81e8f6c0ef7e298e343434ca6dcb8
    networks:
      caddy-net:
        ipv4_address: 172.19.0.21
    read_only: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /run:rw,exec,nosuid,nodev
