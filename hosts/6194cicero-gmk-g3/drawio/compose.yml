networks:
  caddy-net:
    name: caddy-net
    external: true

services:
  drawio:
    cap_drop:
      - ALL
    container_name: drawio
    dns: 172.19.0.2
    deploy:
      resources:
        limits:
          memory: 256M
    expose:
      - 8080
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    hostname: drawio
    image: jgraph/drawio:29.6.10@sha256:65404d379ddd56eab844e1b84bce42f6990ee0da886230eafe9920c5af7d6db2
    labels:
      - 'wud.display.icon=sh:draw-io'
      - 'wud.tag.include=^\d+\.\d+\.\d+$$'
      - 'wud.link.template=https://github.com/jgraph/drawio/releases/tag/v$${major}.$${minor}.$${patch}'
    networks:
      caddy-net:
        ipv4_address: 172.19.0.22
    read_only: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
      - /run:rw,noexec,nosuid,nodev,size=16m
      - /usr/local/tomcat/temp:rw,noexec,nosuid,nodev,size=64m
      - /usr/local/tomcat/work:rw,noexec,nosuid,nodev,size=128m
      - /usr/local/tomcat/logs:rw,noexec,nosuid,nodev,size=32m
