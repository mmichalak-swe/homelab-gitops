networks:
  caddy-net:
    name: caddy-net
    external: true

services:
  speedtest:
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cap_drop:
      - ALL
    container_name: speedtest
    dns: 172.19.0.2
    deploy:
      resources:
        limits:
          memory: 256M
    environment:
      - APP_KEY=${APP_KEY}
      - APP_URL=${APP_URL}
      - DB_CONNECTION=${DB_CONNECTION}
      - DISPLAY_TIMEZONE=${DISPLAY_TIMEZONE}
      - PRUNE_RESULTS_OLDER_THAN=${PRUNE_RESULTS_OLDER_THAN}
      - SPEEDTEST_SCHEDULE=${SPEEDTEST_SCHEDULE}
      - SPEEDTEST_SERVERS=${SPEEDTEST_SERVERS}
      - TZ=${TZ}
    expose:
      - 80
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost/api/healthcheck || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    hostname: speedtest
    image: linuxserver/speedtest-tracker:1.14.1@sha256:bf18a04f9e61573cefb0112ca9604a93a82451ada74050a6b30b41e30651d9a1
    labels:
      - 'wud.display.icon=sh:speedtest-tracker'
      - 'wud.tag.include=^v\d+\.\d+\.\d+.*$$'
      - 'wud.link.template=https://github.com/linuxserver/docker-speedtest-tracker/releases/tag/$${raw}'
    networks:
      caddy-net:
        ipv4_address: 172.19.0.24
    read_only: false
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    volumes:
      - data:/config

volumes:
  data:
