networks:
  caddy-net:
    name: caddy-net
    external: true

services:
  speedtest:
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cap_drop:
      - ALL
    container_name: speedtest
    dns: 172.19.0.2
    deploy:
      resources:
        limits:
          memory: 256M
    environment:
      - APP_KEY=${APP_KEY}
      - APP_URL=${APP_URL}
      - DB_CONNECTION=${DB_CONNECTION}
      - DISPLAY_TIMEZONE=${DISPLAY_TIMEZONE}
      - PRUNE_RESULTS_OLDER_THAN=${PRUNE_RESULTS_OLDER_THAN}
      - SPEEDTEST_SCHEDULE=${SPEEDTEST_SCHEDULE}
      - SPEEDTEST_SERVERS=${SPEEDTEST_SERVERS}
      - TZ=${TZ}
    expose:
      - 80
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost/api/healthcheck || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    hostname: speedtest
    image: linuxserver/speedtest-tracker:1.14.5@sha256:ef562fc6b5e5922e50e13cc796bdc0a45fec7173e410473370fb9f2a4d8a9084
    networks:
      caddy-net:
        ipv4_address: 172.19.0.24
    read_only: false
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    volumes:
      - data:/config

volumes:
  data:
