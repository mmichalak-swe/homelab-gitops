networks:
  caddy-net:
    name: caddy-net
    external: true

services:
  actual_server:
    cap_drop:
      - ALL
    container_name: actual-server
    dns: 172.19.0.2
    deploy:
      resources:
        limits:
          memory: 256M
    expose:
      - 5006
    healthcheck:
      test: ['CMD-SHELL', 'node src/scripts/health-check.js']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    hostname: actual-server
    image: actualbudget/actual-server:26.7.0-alpine@sha256:1449173e2221eb9387da866723808a1fa32a3e92e5cca5df65dc90a532c81ac8
    networks:
      caddy-net:
        ipv4_address: 172.19.0.23
    read_only: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
    user: "1001:1001"
    volumes:
      - data:/data

volumes:
  data:
