networks:
  caddy-net:
    name: caddy-net
    external: true

services:
  actual_server:
    cap_drop:
      - ALL
    container_name: actual-server
    dns: 172.19.0.2
    deploy:
      resources:
        limits:
          memory: 256M
    expose:
      - 5006
    healthcheck:
      test: ['CMD-SHELL', 'node src/scripts/health-check.js']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    hostname: actual-server
    image: actualbudget/actual-server:26.5.2-alpine@sha256:12082ca89dbc5e93b6f806074c19282d97ff04579c784bcdfbe996ce5c52bd0d
    labels:
      - 'wud.display.icon=sh:actual-budget'
      - 'wud.tag.include=^\d+\.\d+\.\d+-alpine$$'
      - 'wud.link.template=https://github.com/actualbudget/actual/releases/tag/v$${major}.$${minor}.$${patch}'
    networks:
      caddy-net:
        ipv4_address: 172.19.0.23
    read_only: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
    user: "1001:1001"
    volumes:
      - data:/data

volumes:
  data:
