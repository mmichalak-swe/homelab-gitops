networks:
  caddy-net:
    name: caddy-net
    external: true

services:
  nebula-sync:
    cap_drop:
      - ALL
    container_name: nebula-sync
    dns: 172.19.0.2
    deploy:
      resources:
        limits:
          memory: 64M
    environment:
      - CRON=${CRON}
      - FULL_SYNC=${FULL_SYNC}
      - PRIMARY=${PRIMARY}
      - REPLICAS=${REPLICAS}
      - RUN_GRAVITY=${RUN_GRAVITY}
      - TZ=${TZ}
    hostname: nebula-sync
    image: ghcr.io/lovelaze/nebula-sync:v0.11.1@sha256:e6bb9ac7dbf4471b066cb5db74929c6fa7cfa2251a0682fa85f6da8f687ba4bf
    labels:
      - 'wud.tag.include=^v\d+\.\d+\.\d+$$'
      - 'wud.link.template=https://github.com/lovelaze/nebula-sync/releases/tag/v$${major}.$${minor}.$${patch}'
    networks:
      caddy-net:
        ipv4_address: 172.19.0.20
    read_only: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
