networks:
  caddy-net:
    name: caddy-net
    external: true

services:
  vaultwarden:
    cap_drop:
      - ALL
    container_name: vaultwarden
    deploy:
      resources:
        limits:
          memory: 256M
    dns: 172.18.0.2
    environment:
      - DOMAIN=${DOMAIN}
    expose:
      - 80
    hostname: vaultwarden
    image: vaultwarden/server:1.35.8-alpine@sha256:f5d0368ee8d29b62afbf9b8e34dcd074e3e22a2973a82f947d2c3260f9e2389a
    labels:
      - 'wud.display.icon=sh:vaultwarden'
      - 'wud.tag.include=^\d+\.\d+\.\d+-alpine'
      - 'wud.link.template=https://github.com/dani-garcia/vaultwarden/releases/tag/$${major}.$${minor}.$${patch}'
    networks:
      caddy-net:
        ipv4_address: 172.18.0.21
    read_only: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /run
      - /var/run
    user: "1000:1000"
    volumes:
      - data:/data/

volumes:
  data:
