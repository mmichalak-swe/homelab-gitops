networks:
  caddy-net:
    name: caddy-net
    external: true

services:
  caddy:
    cap_add:
      - NET_BIND_SERVICE
    cap_drop:
      - ALL
    container_name: caddy
    dns: 172.18.0.2
    environment:
      - PORKBUN_API_KEY=${PORKBUN_API_KEY}
      - PORKBUN_API_SECRET_KEY=${PORKBUN_API_SECRET_KEY}
    expose:
      - 80
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    hostname: caddy
    image: caddy:2.11.3-alpine-custom-porkbun
    labels:
      - 'wud.display.icon=sh:caddy'
      - 'wud.tag.include=^\d+\.\d+\.\d+-alpine'
      - 'wud.link.template=https://github.com/caddyserver/caddy/releases/tag/v$${major}.$${minor}.$${patch}'
    networks:
      caddy-net:
        ipv4_address: 172.18.0.5
    ports:
      - '443:443'
    pull_policy: never
    read_only: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
      - /var/run:rw,noexec,nosuid,nodev,size=16m
    user: "1000:1000"
    volumes:
      - conf:/etc/caddy:ro
      - config:/config
      - data:/data
      - site:/srv:ro

volumes:
  conf:
  config:
  data:
  site:
