networks:
  caddy-net:
    name: caddy-net
    external: true

services:
  caddy:
    cap_add:
      - NET_BIND_SERVICE
    cap_drop:
      - ALL
    container_name: caddy
    dns: 172.18.0.2
    environment:
      - PORKBUN_API_KEY=${PORKBUN_API_KEY}
      - PORKBUN_API_SECRET_KEY=${PORKBUN_API_SECRET_KEY}
    expose:
      - 80
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    hostname: caddy
    image: ghcr.io/mmichalak-swe/homelab-gitops/caddy:2.11.4-alpine-custom-porkbun@sha256:ead43c0a23ef4018522ed1f9f2e0e67eaa1c9228561adc2ca04eb6b636bbe46c
    networks:
      caddy-net:
        ipv4_address: 172.18.0.5
    ports:
      - '443:443'
    pull_policy: never
    read_only: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
      - /var/run:rw,noexec,nosuid,nodev,size=16m
    user: "1000:1000"
    volumes:
      - conf:/etc/caddy:ro
      - config:/config
      - data:/data
      - site:/srv:ro

volumes:
  conf:
  config:
  data:
  site:
