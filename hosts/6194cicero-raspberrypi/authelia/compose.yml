networks:
  caddy-net:
    name: caddy-net
    external: true

services:
  authelia:
    cap_drop:
      - ALL
    container_name: authelia
    dns: 172.18.0.2
    environment:
      - AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET_FILE=${AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET_FILE}
      - AUTHELIA_SESSION_SECRET_FILE=${AUTHELIA_SESSION_SECRET_FILE}
      - AUTHELIA_STORAGE_ENCRYPTION_KEY_FILE=${AUTHELIA_STORAGE_ENCRYPTION_KEY_FILE}
      - TZ=${TZ}
    expose:
      - 9091
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:9091/api/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    hostname: authelia
    image: authelia/authelia:4.39.20@sha256:1b363e9279e742397966333f364e0876ae02bf5c876de73e83af6d48c57ff51b
    mem_limit: 512m
    networks:
      caddy-net:
        ipv4_address: 172.18.0.4
    read_only: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:mode=1777,noexec,nosuid,nodev
      - /run:mode=0755,nosuid,nodev
      - /var/run:mode=0755,nosuid,nodev
    user: "1000:1000"
    volumes:
      - config:/config
      - secrets:/secrets:ro

volumes:
  config:
  secrets:
