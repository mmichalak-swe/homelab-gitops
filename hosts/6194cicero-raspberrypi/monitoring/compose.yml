# https://github.com/oijkn/Docker-Raspberry-PI-Monitoring
networks:
  caddy-net:
    external: true
    name: caddy-net

  monitoring-internal:
    driver: bridge
    internal: true
    ipam:
      config:
        - gateway: 172.18.3.1
          ip_range: 172.18.3.0/24
          subnet: 172.18.3.0/24
    name: monitoring_net

services:
  cadvisor:
    cap_add:
      - SYS_ADMIN
      - SYS_RESOURCE
      - DAC_READ_SEARCH
    cap_drop:
      - ALL
    command:
      - '-docker_only=true'
      - '-housekeeping_interval=15s'
      - '-store_container_labels=false'
    container_name: monitoring-cadvisor
    devices:
      - /dev/kmsg
    expose:
      - 8080
    hostname: monitoring-cadvisor
    image: ghcr.io/google/cadvisor:v0.60.5@sha256:763aecf1c32c2be8a1a75f9abfc2fc461005c9dbbaa39cb356b354aac1296dbe
    networks:
      monitoring-internal:
    read_only: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:mode=1777,noexec,nosuid,nodev,size=64m
    volumes:
      - /:/rootfs:ro
      - /dev/disk/:/dev/disk:ro
      - /etc/machine-id:/etc/machine-id:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /var/run:/var/run:ro

  grafana:
    cap_drop:
      - ALL
    container_name: monitoring-grafana
    depends_on:
      prometheus:
        condition: service_healthy
    dns: 172.18.0.2
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=${GF_USERS_ALLOW_SIGN_UP}
      - GF_PATHS_CONFIG=${GF_PATHS_CONFIG}
      - GF_PATHS_DATA=${GF_PATHS_DATA}
      - GF_PATHS_HOME=${GF_PATHS_HOME}
      - GF_PATHS_LOGS=${GF_PATHS_LOGS}
      - GF_PATHS_PLUGINS=${GF_PATHS_PLUGINS}
      - GF_PATHS_PROVISIONING=${GF_PATHS_PROVISIONING}
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=${GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH}
    expose:
      - 3000
    healthcheck:
      test: curl -f http://localhost:3000/api/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    hostname: monitoring-grafana
    image: grafana/grafana:13.1.1-distroless-slim@sha256:f53ce340797d5cb3611e83e09d7516411110442f5b631bd3798b4653cfb0d505
    networks:
      caddy-net:
        ipv4_address: 172.18.0.11
      monitoring-internal:
    read_only: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:mode=1777,noexec,nosuid,nodev
      - /run:mode=0755,nosuid,nodev
    user: "472"
    volumes:
      - grafana-data:/var/lib/grafana
      - grafana-prov:/etc/grafana/provisioning:ro

  node-exporter:
    cap_drop:
      - ALL
    command:
      - --collector.filesystem.ignored-mount-points
      - ^/(sys|proc|dev|host|etc|rootfs/var/lib/docker/containers|rootfs/var/lib/docker/overlay2|rootfs/run/docker/netns|rootfs/var/lib/docker/aufs)($$|/)
      - --path.procfs=/host/proc
      - --path.rootfs=/host
      - --path.sysfs=/host/sys
    container_name: monitoring-node-exporter
    expose:
      - 9100
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --quiet http://localhost:9100/metrics || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    hostname: monitoring-exporter
    image: prom/node-exporter:v1.12.1@sha256:1b4e4438faca4dd7e001dd445d161a4a2091b0fededa84093b3a8dfeae1f1be0
    networks:
      monitoring-internal:
    read_only: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:mode=1777,noexec,nosuid,nodev
    user: "65534:65534"
    volumes:
      - /:/host:ro,rslave
      - /:/rootfs:ro
      - /proc:/host/proc:ro
      - /run/udev:/run/udev:ro
      - /sys:/host/sys:ro

  prometheus:
    cap_drop:
      - ALL
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.size=10GB'
      - '--storage.tsdb.retention.time=1y'
    container_name: monitoring-prometheus
    depends_on:
      cadvisor:
        condition: service_healthy
      node-exporter:
        condition: service_healthy
    expose:
      - 9090
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://127.0.0.1:9090/-/healthy || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    hostname: monitoring-prometheus
    image: prom/prometheus:v3.13.1@sha256:3c42b892cf723fa54d2f262c37a0e1f80aa8c8ddb1da7b9b0df9455a35a7f893
    networks:
      monitoring-internal:
    read_only: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:mode=1777,noexec,nosuid,nodev
    user: "nobody"
    volumes:
      - prom-etc:/etc/prometheus:ro
      - prom-data:/prometheus

volumes:
  grafana-data:
  grafana-prov:
  prom-data:
  prom-etc:
