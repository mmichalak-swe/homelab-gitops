networks:
  caddy-net:
    name: caddy-net
    external: true

services:
  homer:
    cap_drop:
      - ALL
    container_name: homer
    deploy:
      resources:
        limits:
          memory: 64M
    dns: 172.18.0.2
    environment:
      - INIT_ASSETS=${INIT_ASSETS}
    expose:
      - 8080
    hostname: homer
    image: b4bz/homer:v25.11.1
    labels:
      - 'wud.display.icon=sh:homer'
      - 'wud.tag.include=^v?\d+(?:\.\d{1,2})?\.\d+$$'
      - 'wud.link.template=https://github.com/bastienwirtz/homer/releases/tag/$${raw}'
    networks:
      caddy-net:
        ipv4_address: 172.18.0.23
    read_only: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:mode=1777,noexec,nosuid,nodev
      - /run:mode=0755,nosuid,nodev
      - /var/run:mode=0755,nosuid,nodev
    user: 1000:1000
    volumes:
      - assets:/www/assets

volumes:
  assets:
