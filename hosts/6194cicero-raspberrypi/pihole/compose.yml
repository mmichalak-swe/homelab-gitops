networks:
  caddy-net:
    name: caddy-net
    external: true

services:
  pihole-rpi4:
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - NET_ADMIN
      - NET_BIND_SERVICE
      - SETFCAP
      - SETUID
      - SETGID
    cap_drop:
      - ALL
    container_name: pihole-rpi4
    depends_on:
      unbound:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    entrypoint: ["/startup/startup_wg.sh"]
    environment:
      - DNSMASQ_USER=${DNSMASQ_USER}
      - FTLCONF_dns_bogusPriv=${FTLCONF_dns_bogusPriv}
      - FTLCONF_dns_dnssec=${FTLCONF_dns_dnssec}
      - FTLCONF_dns_domainNeeded=${FTLCONF_dns_domainNeeded}
      - FTLCONF_dns_listeningMode=${FTLCONF_dns_listeningMode}
      - FTLCONF_dns_upstreams=${FTLCONF_dns_upstreams}
      - FTLCONF_webserver_api_password=${FTLCONF_webserver_api_password}
      - PIHOLE_GID=${PIHOLE_GID}
      - PIHOLE_UID=${PIHOLE_UID}
      - TZ=${TZ}
    expose:
      - 80
    hostname: pihole-rpi4
    image: pihole/pihole:2026.04.1@sha256:1c32c36b862a12762656b6471c854cebc01fe945639ba3a893611337c2c95e99
    labels:
      - 'wud.display.icon=sh:pi-hole'
      - 'wud.tag.include=^\d+(?:\.\d{1,2})?\.\d+$$'
      - 'wud.link.template=https://github.com/pi-hole/docker-pi-hole/releases/tag/$${raw}'
    networks:
      caddy-net:
        ipv4_address: 172.18.0.2
    ports:
      - "53:53/tcp"
      - "53:53/udp"
    read_only: false
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /run
      - /var/run
      - /var/log/pihole
    volumes:
      - etc-pihole:/etc/pihole
      - startup:/startup:ro


  unbound:
    cap_drop:
      - ALL
    container_name: unbound
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ['CMD', 'drill-hc', '@172.18.0.3', 'dnssec.works']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    hostname: unbound
    image: klutchell/unbound:1.24.2@sha256:cb9a0f06c803c764395e2ff50bd8a244470601290c78fb2cdcf1bd200a027cd6
    labels:
      - 'wud.display.icon=sh:unbound'
      - 'wud.tag.include=^\d+\.\d+\.\d+$$'
      - 'wud.link.template=https://github.com/klutchell/unbound-docker/releases/tag/v$${major}.$${minor}.$${patch}'
    networks:
      caddy-net:
        ipv4_address: 172.18.0.3
    read_only: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    user: "101:102"
    volumes:
      - unbound-config:/etc/unbound


volumes:
  etc-pihole:
  startup:
  unbound-config:
