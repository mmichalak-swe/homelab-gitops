name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    paths:
      - 'Dockerfiles/*/Dockerfile'
  workflow_dispatch:
    inputs:
      manual_directory:
        description: 'Directory to build (e.g., Dockerfiles/my-app). Leave empty to auto-detect all.'
        required: false
        default: ''
      manual_version:
        description: 'Manual version override (e.g., 2.7.6). If left empty, extracts from Dockerfile.'
        required: false
        default: ''

permissions:
  contents: read
  packages: write

jobs:
  detect-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Required step to emulate arm64 on the standard amd64 GitHub runner
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64,amd64

      # Explicitly provisions a 'docker-container' driver builder instance
      # This is technically required to build multi-platform manifest lists
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Evaluate Directories and Build
        run: |
          if [ -n "${{ github.event.inputs.manual_directory }}" ]; then
            DIRECTORIES="${{ github.event.inputs.manual_directory }}"
          else
            CHANGED_FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -E "^Dockerfiles/[^/]+/Dockerfile$" || true)
            if [ -z "$CHANGED_FILES" ]; then
              echo "No Dockerfiles were modified. Exiting."
              exit 0
            fi
            DIRECTORIES=$(echo "$CHANGED_FILES" | xargs -I {} dirname {})
          fi

          for DIR in $DIRECTORIES; do
            echo "----------------------------------------------"
            echo "Processing folder: $DIR"

            APP_NAME=$(basename "$DIR")
            DOCKERFILE_PATH="$DIR/Dockerfile"

            if [ -n "${{ github.event.inputs.manual_version }}" ]; then
              VERSION="${{ github.event.inputs.manual_version }}"
              echo "Using manual override version: $VERSION"
            else
              FROM_LINE=$(grep -n "# renovate: target-version" "$DOCKERFILE_PATH" | head -n 1 | cut -d: -f1 | xargs -I {} sh -c 'sed -n "$(({}+1))p" '"$DOCKERFILE_PATH"')
              if [ -n "$FROM_LINE" ]; then
                VERSION=$(echo "$FROM_LINE" | sed -E -e 's/^[^:]+://' -e 's/[[:space:]]+.*//' -e 's/-alpine.*//' -e 's/-slim.*//' -e 's/-debian.*//' -e 's/-ubuntu.*//')
                echo "Automatically extracted target version: $VERSION"
              else
                echo "WARNING: No '# renovate: target-version' comment found. Falling back to 'latest'."
                VERSION="latest"
              fi
            fi

            REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            IMAGE_URI="ghcr.io/$REPO_LOWER/$APP_NAME"

            echo "Building multi-arch image and pushing to: $IMAGE_URI"

            docker buildx build \
              --file "$DOCKERFILE_PATH" \
              --platform linux/amd64,linux/arm64 \
              --tag "$IMAGE_URI:$VERSION" \
              --tag "$IMAGE_URI:latest" \
              --cache-from type=gha,scope=$APP_NAME \
              --cache-to type=gha,mode=max,scope=$APP_NAME \
              --push \
              "$DIR"
          done
